<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Link Hub de Haynan Kerlin: Engenharia de Software, Linux, GitHub, Markdown e projetos."

      <section class="profile" aria-labelledby="profile-title">

          Este hub foi preparado para receber links de afiliado, produtos digitais,

    <script src="./assets/js/links.js"></script>
    <script src="./assets/js/analytics.js"></script>
